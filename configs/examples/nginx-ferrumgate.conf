# FerrumGate TLS reverse proxy example for nginx.
# Replace server_name and certificate paths before use.

server {
    listen 80;
    server_name ferrumgate.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ferrumgate.example.com;

    ssl_certificate /etc/letsencrypt/live/ferrumgate.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ferrumgate.example.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    client_max_body_size 1m;

    # FerrumGate should bind only to loopback behind this proxy.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # Forward the exact incoming Authorization header. Do not prepend "Bearer" here;
        # clients already send "Authorization: Bearer <token>".
        proxy_set_header Authorization $http_authorization;
    }
}
