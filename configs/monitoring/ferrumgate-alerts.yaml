# FerrumGate Alert Rules for Prometheus
#
# This is a TEMPLATE with PLACEHOLDER thresholds.
# Adjust thresholds based on your workload and monitoring requirements.
#
# USAGE:
#   1. Copy to Prometheus rules directory (e.g., /etc/prometheus/rules/)
#   2. Update prometheus.yml to include this file in rule_files
#   3. Reload Prometheus: curl -X POST http://localhost:9090/-/reload
#
# NOTES:
#   - These are example rules based on FerrumGate metrics
#   - Adjust thresholds for your environment
#   - For production, add more specific alert conditions

groups:
  # FerrumGate service alerts
  - name: ferrumgate
    # How frequently to evaluate rules
    interval: 30s

    rules:
      # Service availability
      - alert: FerrumGateDown
        expr: up{job="ferrumgate"} == 0
        for: 1m
        labels:
          severity: critical
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate instance is down"
          description: "FerrumGate has been unreachable for more than 1 minute."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-down"

      # Service health
      - alert: FerrumGateStoreUnhealthy
        expr: ferrumgate_store_health_up != 1
        for: 1m
        labels:
          severity: critical
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate store is unhealthy"
          description: "FerrumGate SQLite store health check is failing. Database may be corrupted or inaccessible."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-store-unhealthy"

      # Write queue depth
      - alert: FerrumGateWriteQueueHigh
        expr: ferrumgate_write_queue_depth > 100
        for: 5m
        labels:
          severity: warning
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate write queue is high"
          description: "Write queue depth is {{ $value }}, expected < 100. System may be experiencing write contention."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-queue-high"

      # Write queue full (blocked)
      - alert: FerrumGateWriteQueueFull
        expr: ferrumgate_write_queue_depth > 1000
        for: 2m
        labels:
          severity: critical
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate write queue is full"
          description: "Write queue depth is {{ $value }}. System is blocking writes. Immediate action required."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-queue-full"

      # Backup status
      - alert: FerrumGateNoRecentBackup
        expr: |
          (time() - ferrumgate_backup_last_success_timestamp) > 3600
        for: 5m
        labels:
          severity: warning
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate has no recent backup"
          description: "No successful backup in the last hour. Last backup was {{ $value | humanizeDuration }} ago."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-no-recent-backup"

      # High error rate (5xx responses)
      - alert: FerrumGateHighErrorRate
        expr: |
          rate(ferrumgate_http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate high error rate"
          description: "Error rate is {{ $value | printf \"%.3f\" }} errors/sec (threshold: 0.05)."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-high-error-rate"

      # High latency
      - alert: FerrumGateHighLatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(ferrumgate_http_request_duration_seconds_bucket[5m])) by (le, handler)
          ) > 5
        for: 5m
        labels:
          severity: warning
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate high latency"
          description: "99th percentile latency is {{ $value | printf \"%.2f\" }}s for handler {{ $labels.handler }}."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-high-latency"

      # Authentication failures
      - alert: FerrumGateHighAuthFailureRate
        expr: |
          rate(ferrumgate_auth_failures_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate high authentication failure rate"
          description: "Authentication failure rate is {{ $value | printf \"%.2f\" }} failures/sec. Possible brute force attack."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-auth-failures"

      # Capability minting failures
      - alert: FerrumGateCapabilityMintFailures
        expr: |
          rate(ferrumgate_capability_mint_failures_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate capability minting failures"
          description: "Capability minting failure rate is {{ $value | printf \"%.3f\" }} failures/sec."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-cap-mint-failures"

      # Policy evaluation failures
      - alert: FerrumGatePolicyEvalFailures
        expr: |
          rate(ferrumgate_policy_evaluation_failures_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate policy evaluation failures"
          description: "Policy evaluation failure rate is {{ $value | printf \"%.3f\" }} failures/sec."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-policy-eval-failures"

      # Execution failures
      - alert: FerrumGateExecutionFailures
        expr: |
          rate(ferrumgate_execution_failures_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate execution failures"
          description: "Execution failure rate is {{ $value | printf \"%.3f\" }} failures/sec."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-execution-failures"

      # Rollback failures
      - alert: FerrumGateRollbackFailures
        expr: |
          rate(ferrumgate_rollback_failures_total[5m]) > 0.01
        for: 5m
        labels:
          severity: critical
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate rollback failures"
          description: "Rollback failure rate is {{ $value | printf \"%.4f\" }} failures/sec. Compensations may not complete."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-rollback-failures"

      # Provenance chain gaps
      - alert: FerrumGateProvenanceGaps
        expr: |
          rate(ferrumgate_provenance_gaps_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate provenance chain gaps detected"
          description: "Provenance gap rate is {{ $value | printf \"%.3f\" }} gaps/sec. Lineage may be incomplete."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-provenance-gaps"

  # Instance-level alerts
  - name: ferrumgate_instance
    interval: 30s

    rules:
      # High CPU usage
      - alert: FerrumGateHighCPU
        expr: |
          100 * (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (instance))
          > 80
        for: 10m
        labels:
          severity: warning
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate instance high CPU usage"
          description: "CPU usage is {{ $value | printf \"%.1f\" }}% on instance {{ $labels.instance }}."

      # High memory usage
      - alert: FerrumGateHighMemory
        expr: |
          100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
          > 85
        for: 10m
        labels:
          severity: warning
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate instance high memory usage"
          description: "Memory usage is {{ $value | printf \"%.1f\" }}% on instance {{ $labels.instance }}."

      # Disk space low
      - alert: FerrumGateDiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/var/lib/ferrumgate"} /
           node_filesystem_size_bytes{mountpoint="/var/lib/ferrumgate"})
          < 0.1
        for: 5m
        labels:
          severity: critical
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate instance low disk space"
          description: "Disk space available is {{ $value | humanizePercentage }} on instance {{ $labels.instance }}."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-disk-space-low"

  # PostgreSQL-specific alerts
  # NOTE: These alerts use metrics emitted only when ferrumd is configured with
  # a PostgreSQL DSN. If running SQLite, these metrics are absent and these rules
  # should NOT be enabled (or will fire as intended if metrics should be present).
  - name: ferrumgate_postgres
    interval: 30s

    rules:
      # PostgreSQL connection down or backend not emitting PG metrics.
      # TEMPLATE: Enable only when ferrumd is configured with postgres:// DSN.
      # If you run postgres_exporter separately, prefer:
      #   up{job="postgres"} == 0
      - alert: FerrumGatePostgresMetricsAbsent
        expr: absent(ferrumgate_store_pg_pool_max) == 1
        for: 2m
        labels:
          severity: critical
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate PostgreSQL metrics are absent"
          description: "ferrumd is not emitting PostgreSQL pool metrics. Either the store backend is not PostgreSQL, or the PG connection is lost and the service has stopped reporting."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-pg-down"

      # Pool saturation — all connections in use.
      - alert: FerrumGatePostgresPoolSaturation
        expr: |
          (
            ferrumgate_store_pg_pool_idle == 0
            and ferrumgate_store_pg_pool_size >= ferrumgate_store_pg_pool_max
            and ferrumgate_store_pg_pool_max > 0
          )
        for: 1m
        labels:
          severity: warning
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate PostgreSQL connection pool is saturated"
          description: "PG pool has 0 idle connections out of max. New requests may block or timeout."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-pg-pool-saturation"

      # Slow acquire — connection acquisition timeouts.
      - alert: FerrumGatePostgresSlowAcquire
        expr: |
          rate(ferrumgate_store_pg_acquire_timeouts_total[5m]) > 0
        for: 2m
        labels:
          severity: warning
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate PostgreSQL connection acquire timeouts"
          description: "PG pool acquire timeout rate is {{ $value | printf \"%.3f\" }} timeouts/sec. Pool may be undersized or PG may be slow/unreachable."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-pg-slow-acquire"

      # Backup stale — PG-specific threshold (relies on generic backup metric).
      # TEMPLATE: Adjust threshold based on your backup cadence.
      - alert: FerrumGatePostgresBackupStale
        expr: |
          (time() - ferrumgate_backup_last_success_timestamp) > 7200
        for: 5m
        labels:
          severity: warning
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate PostgreSQL backup is stale"
          description: "No successful backup in the last 2 hours. Last backup was {{ $value | humanizeDuration }} ago."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-pg-backup-stale"

      # Replication lag — PLACEHOLDER / DEFERRED.
      # Requires postgres_exporter or equivalent for pg_stat_replication metrics.
      # Enable only when HA/replication is deployed (PG-5).
      - alert: FerrumGatePostgresReplicationLag
        expr: |
          pg_stat_replication_pg_wal_lsn_diff / 1024 / 1024 / 1024 > 1
        for: 5m
        labels:
          severity: warning
          service: ferrumgate
          team: platform
        annotations:
          summary: "FerrumGate PostgreSQL replication lag high (TEMPLATE)"
          description: "Replication lag is {{ $value | printf \"%.2f\" }} GB. Threshold and metric are TEMPLATE — requires postgres_exporter or equivalent. HA/replication not deployed."
          runbook_url: "https://docs.example.com/runbooks/ferrumgate-pg-replication-lag"
