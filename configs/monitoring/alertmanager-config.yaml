# AlertManager Configuration Template for FerrumGate
#
# This is a TEMPLATE with PLACEHOLDER values.
# NO actual alerts will be sent until real receivers are configured.
# NO email literal is stored in this configuration.
#
# USAGE:
#   1. Copy this file to your AlertManager config directory
#   2. Replace PLACEHOLDER values with actual receiver configurations
#   3. Validate: amtool check-config /path/to/alertmanager.yml
#   4. Reload: curl -X POST http://localhost:9093/-/reload
#
# PLACEHOLDERS (must be replaced):
#   - ${ALERT_CONTACT}: Your alert contact email (or use other receiver type)
#   - ${ALERTMANAGER_URL}: Your AlertManager URL for routing
#
# RECEIVER TYPES:
#   - email_configs: Email notifications
#   - slack_configs: Slack webhooks
#   - pagerduty_configs: PagerDuty integration
#   - webhook_configs: Generic webhooks
#   - opsgenie_configs: OpsGenie integration
#   - victorops_configs: VictorOps integration

# Global configuration
global:
  # How long to wait before resolving an alert
  resolve_timeout: 5m
  # SMTP configuration (only needed for email receivers)
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'OPERATOR_PROVIDED_SMTP_FROM'
  # smtp_auth_username: 'alertmanager'
  # smtp_auth_password: 'REPLACE_WITH_PASSWORD'

# Templates for custom notification formatting
templates:
  # - '/etc/alertmanager/templates/*.tmpl'

# Route tree - defines how alerts are grouped and routed
route:
  # Group alerts by these labels
  group_by:
    - 'alertname'
    - 'severity'
    - 'service'
    - 'instance'

  # Wait this long before sending the first notification for a group
  group_wait: 10s

  # Wait this long before sending a notification when a new group was already sent
  group_interval: 10s

  # Wait this long before re-sending a resolved alert
  repeat_interval: 12h

  # Default receiver (must match a receiver name below)
  receiver: 'ferrumgate-alerts'

  # Child routes for specific alert routing
  routes:
    # Route critical alerts immediately
    - match:
        severity: critical
      receiver: 'ferrumgate-alerts-critical'
      group_wait: 0s
      repeat_interval: 1h

    # Route warnings to separate receiver
    - match:
        severity: warning
      receiver: 'ferrumgate-alerts-warning'

    # Route by service
    - match:
        service: ferrumgate
      receiver: 'ferrumgate-alerts'
      routes:
        - match:
            severity: critical
          receiver: 'ferrumgate-alerts-critical'

# Inhibition rules - suppress alerts based on other alerts
inhibit_rules:
  # Inhibit warning alerts when a critical alert is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    # Only inhibit if alertname and service match
    equal:
      - 'alertname'
      - 'service'
      - 'instance'

  # Example: Inhibit all alerts for an instance if it's down
  - source_match:
      alertname: 'InstanceDown'
    target_match_re:
      severity: '.+'
    equal:
      - 'instance'

# Receiver definitions
receivers:
  # Main FerrumGate alerts receiver
  - name: 'ferrumgate-alerts'

    # PLACEHOLDER: Choose one or more receiver types below

    # Email receiver (uncomment and configure):
    # email_configs:
    #   - to: '${ALERT_CONTACT}'
    #     # Or use a list:
