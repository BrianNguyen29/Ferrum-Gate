    #     # - 'OPERATOR_PROVIDED_TEAM_2'
    #     send_resolved: true
    #     headers:
    #       subject: '{% raw %}{{ .GroupLabels.alertname }} - {{ .Status | toUpper }}{% endraw %}'
    #     html: |
    #       {% raw %}<h1>{{ .GroupLabels.alertname }}</h1>
    #       <p><strong>Status:</strong> {{ .Status | toUpper }}</p>
    #       <p><strong>Severity:</strong> {{ .Labels.severity }}</p>
    #       <p><strong>Service:</strong> {{ .Labels.service }}</p>
    #       <p><strong>Description:</strong> {{ .Annotations.description }}</p>
    #       <p><strong>Details:</strong> {{ .Annotations.summary }}</p>{% endraw %}

    # Slack receiver (uncomment and configure):
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/REPLACE/WITH/YOUR/WEBHOOK/URL'
    #     channel: '#alerts-ferrumgate'
    #     send_resolved: true
    #     title: '{% raw %}{{ if eq .Status "firing" }}🔴{{ else }}✅{{ endraw %} {{ .GroupLabels.alertname }}'
    #     text: |
    #       {% raw %}{{ range .Alerts }}
    #       *Alert:* {{ .Labels.alertname }}
    #       *Severity:* {{ .Labels.severity }}
    #       *Status:* {{ .Status }}
    #       *Description:* {{ .Annotations.description }}
    #       *Details:* {{ .Annotations.summary }}
    #       {{ end }}{% endraw %}

    # PagerDuty receiver (uncomment and configure):
    # pagerduty_configs:
    #   - service_key: 'REPLACE_WITH_PAGERDUTY_SERVICE_KEY'
    #     send_resolved: true
    #     severity: '{% raw %}{{ .Labels.severity }}{% endraw %}'
    #     class: 'ferrumgate'
    #     component: '{% raw %}{{ .Labels.service }}{% endraw %}'
    #     group: '{% raw %}{{ .GroupLabels.alertname }}{% endraw %}'

    # Webhook receiver (uncomment and configure):
    webhook_configs:
      - url: 'http://localhost:9093/webhook'
        send_resolved: true
        # For AlertManager v0.24+:
        # http_config:
        #   timeout: 30s

  # Critical alerts - separate receiver for urgent notifications
  - name: 'ferrumgate-alerts-critical'

    # PLACEHOLDER: Configure critical alert receiver
    # Example: Different email for critical alerts
    # email_configs:
    #   - to: 'OPERATOR_PROVIDED_ONCALL_CONTACT'
    #     send_resolved: true

    webhook_configs:
      - url: 'http://localhost:9093/webhook'
        send_resolved: true

  # Warning alerts - lower priority notifications
  - name: 'ferrumgate-alerts-warning'

    # PLACEHOLDER: Configure warning alert receiver
    webhook_configs:
      - url: 'http://localhost:9093/webhook'
        send_resolved: true

