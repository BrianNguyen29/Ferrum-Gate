[server]
host = "0.0.0.0"
port = 8080

[policy]
bundle_path = "contracts/policy-bundle.example.yaml"
strict_manifest_pinning = true

[ledger]
backend = "sqlite"

[store]
backend = "sqlite"
dsn = "sqlite://ferrumgate.prod.db"

[features]
enable_firewall = true
enable_provenance = true
enable_rollback = true
enable_draft_only_default = true
