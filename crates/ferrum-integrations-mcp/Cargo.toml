[package]
name = "ferrum-integrations-mcp"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
ferrum-proto = { path = "../ferrum-proto" }

# HTTP client for the gateway ingest endpoint
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }

# URL parsing for gateway endpoint URL
url = "2"

# Error handling
anyhow.workspace = true
thiserror.workspace = true

# Serialization
serde.workspace = true
serde_json.workspace = true

# Async runtime
tokio.workspace = true

# Tracing
tracing.workspace = true

# Date/time
chrono.workspace = true

# UUID for digest computation
uuid.workspace = true
sha2.workspace = true

[dev-dependencies]
tokio-test = "0.4"
