name: secret-history-scan

# Scheduled and manual workflow for scanning git history for secrets.
# Uses gitleaks if available (Docker or binary); falls back to a high-entropy
# grep script that requires no external secrets or auth.
#
# This is NOT a compliance gate. It is an operational safety net.

on:
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * 1'

jobs:
  secret-history-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required for gitleaks and fallback scan
          fetch-depth: 0

      - name: Git History Secret Scan
        shell: bash
        run: bash scripts/run_secret_history_scan.sh

      - name: Write job summary
        if: always()
        run: |
          echo "## Secret History Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "- Status: PASS" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Status: FAIL (see logs for findings)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tool preference: gitleaks (binary or Docker) → fallback high-entropy grep" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This scan is **evidence-only** and does not constitute formal compliance." >> $GITHUB_STEP_SUMMARY
