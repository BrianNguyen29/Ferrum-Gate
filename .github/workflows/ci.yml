name: ci

on:
  push:
  pull_request:

jobs:
  release-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hardcoded secrets scan
        run: bash scripts/run_secret_scan.sh
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo security audit tools
        run: |
          cargo install --locked cargo-deny
          cargo install --locked cargo-audit
      - name: Dependency security audit
        run: bash scripts/run_security_audit.sh

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show repository tree
        run: find . -maxdepth 3 | sort
      - name: Local validation
        run: make validate
      - name: Route scope documentation contract
        run: python3 scripts/validate_route_scope_docs.py
      - name: Documentation TOML snippets contract
        run: python3 scripts/validate_docs_toml_snippets.py
      - name: Monitoring metric contract
        run: python3 scripts/validate_monitoring_metrics.py
      - name: Prometheus rule validation
        run: >-
          docker run --rm
          --entrypoint /bin/promtool
          --volume "$PWD/configs/monitoring:/rules:ro"
          prom/prometheus:v2.53.5
          check rules /rules/ferrumgate-alerts.yaml
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Helm chart lint and render
        run: |
          helm lint deploy/helm/ferrumgate \
            --set secrets.bearerToken=ci-placeholder-token-not-for-production
          helm template ferrumgate deploy/helm/ferrumgate \
            --set secrets.bearerToken=ci-placeholder-token-not-for-production >/tmp/ferrumgate-rendered.yaml
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo fmt check
        run: cargo fmt --all -- --check
      - name: Cargo check
        run: cargo check --workspace
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Cargo test
        run: cargo test --workspace
      - name: Cargo check (all features)
        run: cargo check --workspace --all-features
      - name: Cargo clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Cargo check (postgres feature)
        run: cargo check -p ferrumd -p ferrum-migrate -p ferrum-store -p ferrum-gateway --features postgres
      - name: Cargo clippy (postgres feature)
        run: cargo clippy -p ferrumd -p ferrum-migrate -p ferrum-store -p ferrum-gateway --features postgres -- -D warnings
      - name: Release profile smoke
        run: bash scripts/validate_release_feature_profile.sh
      - name: ferrum-stress machine-readable smoke
        shell: bash
        run: |
          set -euo pipefail
          cargo run -q -p ferrum-stress -- \
            --scenario health \
            --duration 1 \
            --concurrency 1 \
            --output-format json >/tmp/ferrum-stress.json
          python3 - <<'PY'
          import json

          with open("/tmp/ferrum-stress.json", encoding="utf-8") as fh:
              summary = json.load(fh)
          assert summary["scenarios"][0]["scenario"] == "health"
          assert summary["scenarios"][0]["total_requests"] > 0
          PY

          cargo run -q -p ferrum-stress -- \
            --scenario health \
            --duration 1 \
            --concurrency 1 \
            --output-format junit >/tmp/ferrum-stress.xml
          python3 - <<'PY'
          import xml.etree.ElementTree as ET

          root = ET.parse("/tmp/ferrum-stress.xml").getroot()
          assert root.tag == "testsuite"
          assert root.attrib["name"] == "ferrum-stress"
          PY

  postgres-live-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ferrumgate_dev
          POSTGRES_PASSWORD: ferrumgate_dev_password
          POSTGRES_DB: ferrumgate_p2_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ferrumgate_dev -d ferrumgate_p2_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo test (PostgreSQL live, no skips)
        shell: bash
        run: |
          set -euo pipefail
          log_file="$(mktemp)"
          trap 'rm -f "$log_file"' EXIT

          cargo test -p ferrum-store --features postgres \
            --test postgres_intents -- --nocapture 2>&1 | tee "$log_file"

          if grep -Eq 'Skipping postgres live test|apply_embedded_migrations failed' "$log_file"; then
            echo "PostgreSQL live tests reported a skipped or failed database setup." >&2
            exit 1
          fi

          if ! grep -Eq 'test result: ok\. [1-9][0-9]* passed; 0 failed; 0 ignored;' "$log_file"; then
            echo "PostgreSQL live tests did not report a non-empty, fully executed suite." >&2
            exit 1
          fi

      - name: Boot ferrumd with PostgreSQL and probe health/readiness
        shell: bash
        run: |
          set -euo pipefail
          LOG_FILE="$(mktemp)"
          trap 'rm -f "$LOG_FILE"; kill "$FERRUMD_PID" 2>/dev/null || true' EXIT

          cargo build --features postgres --package ferrumd

          FERRUMD_BIN="./target/debug/ferrumd"
          BIND_ADDR="127.0.0.1:8080"

          nohup "$FERRUMD_BIN" \
            --store-dsn "postgres://ferrumgate_dev:ferrumgate_dev_password@localhost:5432/ferrumgate_p2_test" \
            --bind-addr "$BIND_ADDR" \
            --auth-mode disabled \
            --log-filter warn \
            >"$LOG_FILE" 2>&1 &
          FERRUMD_PID=$!
          echo "[INFO] ferrumd started (PID $FERRUMD_PID) on $BIND_ADDR"

          # Poll /v1/healthz
          HEALTHY=false
          for i in {1..30}; do
            if curl -sf "http://$BIND_ADDR/v1/healthz" >/dev/null 2>&1; then
              HEALTHY=true
              break
            fi
            sleep 1
          done

          if [[ "$HEALTHY" != "true" ]]; then
            echo "[ERROR] /v1/healthz did not return 200 within 30s" >&2
            echo "[INFO] Last 30 lines of ferrumd log:"
            tail -n 30 "$LOG_FILE" || true
            exit 1
          fi
          echo "[OK] /v1/healthz returned 200"

          # Poll /v1/readyz/deep
          READY=false
          for i in {1..30}; do
            if curl -sf "http://$BIND_ADDR/v1/readyz/deep" >/dev/null 2>&1; then
              READY=true
              break
            fi
            sleep 1
          done

          if [[ "$READY" != "true" ]]; then
            echo "[ERROR] /v1/readyz/deep did not return 200 within 30s" >&2
            echo "[INFO] Last 30 lines of ferrumd log:"
            tail -n 30 "$LOG_FILE" || true
            exit 1
          fi
          echo "[OK] /v1/readyz/deep returned 200"

          # Graceful shutdown
          kill "$FERRUMD_PID" || true
          wait "$FERRUMD_PID" || true

  s3-live-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start MinIO
        run: |
          docker run -d --name ferrum-minio \
            -p 9000:9000 -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-01-20T14-49-07Z \
            server /data --console-address ":9001"
      - name: Wait for MinIO
        run: |
          for i in $(seq 1 30); do
            if curl -sSf http://localhost:9000/minio/health/live >/dev/null 2>&1; then
              echo "[OK] MinIO is ready"
              exit 0
            fi
            sleep 1
          done
          echo "[ERROR] MinIO did not become healthy within 30s" >&2
          docker logs ferrum-minio
          exit 1
      - name: Check AWS CLI version
        run: aws --version
      - name: Create versioned bucket
        run: |
          aws configure set aws_access_key_id minioadmin
          aws configure set aws_secret_access_key minioadmin
          aws --endpoint-url http://localhost:9000 --region us-east-1 s3 mb s3://ferrum-test-bucket
          aws --endpoint-url http://localhost:9000 --region us-east-1 s3api put-bucket-versioning \
            --bucket ferrum-test-bucket \
            --versioning-configuration Status=Enabled
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo test (S3 MinIO live, ignored tests)
        shell: bash
        run: |
          set -euo pipefail
          cargo test -p ferrum-adapter-s3 --test minio_integration -- --ignored --nocapture
      - name: Cleanup MinIO
        if: always()
        run: docker rm -f ferrum-minio || true

  coverage-and-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx
      - name: Generate coverage (LCOV)
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Generate coverage (text summary)
        run: cargo llvm-cov --workspace --text --output-path coverage.txt
      - name: Generate SBOM (CycloneDX JSON)
        run: cargo cyclonedx --all --output-format json
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            lcov.info
            coverage.txt
          retention-days: 30
      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: target/cyclonedx/*.json
          retention-days: 30
