name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show repository tree
        run: find . -maxdepth 3 | sort
      - name: Validate repo layout
        run: bash scripts/validate_repo_layout.sh
      - name: Check contract consistency
        run: python3 scripts/check_contract_consistency.py
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo check
        run: cargo check --workspace || true
