name: Docs Improvement
description: Suggest an improvement to documentation, guides, or README
title: "[docs] "
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Which file or section? Provide a link or path if possible.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is unclear or missing?
      description: Describe the gap. Is it missing context, outdated, or hard to follow?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: What should it say instead? Provide a draft if you have one.
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked the latest version of the file on main.
          required: true
        - label: This change does not introduce a feature request masquerading as a docs issue.
          required: true
