<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-labelledby="fg-mark-title fg-mark-desc">
  <title id="fg-mark-title">FerrumGate mark</title>
  <desc id="fg-mark-desc">A hexagonal iron frame with the FG monogram and a single-use capability key underneath, the symbol of the FerrumGate governance gateway.</desc>

  <style>
    .fg-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Helvetica Neue", Arial, "Liberation Sans", sans-serif; }
    .fg-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }

    .fg-frame  { fill: none; stroke: #2d3344; stroke-width: 8; stroke-linejoin: round; stroke-linecap: round; }
    .fg-stroke { fill: none; stroke: #2d3344; stroke-width: 4; stroke-linejoin: round; stroke-linecap: round; }
    .fg-stroke-soft { fill: none; stroke: #2d3344; stroke-width: 2.5; stroke-linejoin: round; stroke-linecap: round; opacity: 0.45; }
    .fg-stroke-rail { fill: none; stroke: #4f6b9c; stroke-width: 4; stroke-linejoin: round; stroke-linecap: round; }
    .fg-stroke-rust { fill: none; stroke: #b8553a; stroke-width: 4; stroke-linejoin: round; stroke-linecap: round; }
    .fg-fill-mute   { fill: #1f2330; }
    .fg-fill-rail   { fill: #4f6b9c; }
    .fg-fill-rust   { fill: #b8553a; }
    .fg-text-mono   { font-size: 92px; font-weight: 700; letter-spacing: -0.04em; fill: #1f2330; }

    @media (prefers-color-scheme: dark) {
      .fg-frame  { stroke: #c4cad8; }
      .fg-stroke { stroke: #c4cad8; }
      .fg-stroke-soft { stroke: #c4cad8; opacity: 0.5; }
      .fg-stroke-rail { stroke: #7aa2f7; }
      .fg-stroke-rust { stroke: #d97757; }
      .fg-fill-mute   { fill: #d8dce6; }
      .fg-fill-rail   { fill: #7aa2f7; }
      .fg-fill-rust   { fill: #d97757; }
      .fg-text-mono   { fill: #d8dce6; }
    }
  </style>

  <!-- ============================== Hexagonal iron frame ============================== -->
  <polygon class="fg-frame" points="128,16 226,72 226,184 128,240 30,184 30,72" />

  <!-- ============================== FG monogram ============================== -->
  <text class="fg-sans fg-text-mono" x="128" y="148" text-anchor="middle">FG</text>

  <!-- ============================== Capability key (the "iron bar" with TTL ticks) ============================== -->
  <g transform="translate(64, 174)">
    <!-- Shaft -->
    <line class="fg-stroke" x1="0" y1="0" x2="118" y2="0" />
    <!-- Right end: token cap with a small notch -->
    <line class="fg-stroke" x1="118" y1="0" x2="118" y2="10" />
    <line class="fg-stroke" x1="128" y1="0" x2="128" y2="14" />
    <line class="fg-stroke" x1="118" y1="10" x2="128" y2="14" />
    <!-- Left end: bow -->
    <circle class="fg-stroke" cx="0" cy="0" r="6" />
    <!-- TTL tick marks (single-use indicator) -->
    <line class="fg-stroke-soft" x1="32"  y1="0" x2="32"  y2="-6" />
    <line class="fg-stroke-soft" x1="52"  y1="0" x2="52"  y2="-6" />
    <line class="fg-stroke-soft" x1="72"  y1="0" x2="72"  y2="-6" />
    <line class="fg-stroke-soft" x1="92"  y1="0" x2="92"  y2="-6" />
  </g>

  <!-- ============================== Side bolt accents (the "iron" detail) ============================== -->
  <circle class="fg-fill-mute" cx="44"  cy="86"  r="2.5" />
  <circle class="fg-fill-mute" cx="212" cy="86"  r="2.5" />
  <circle class="fg-fill-mute" cx="44"  cy="170" r="2.5" />
  <circle class="fg-fill-mute" cx="212" cy="170" r="2.5" />
</svg>
