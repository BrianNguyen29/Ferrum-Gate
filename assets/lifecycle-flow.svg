<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 240" width="1100" height="240" role="img" aria-labelledby="fg-flow-title fg-flow-desc">
  <title id="fg-flow-title">FerrumGate Execution Lifecycle</title>
  <desc id="fg-flow-desc">The minimum lineage chain before a side effect: Compile, Authorize, Execute, Verify and Record. Each phase groups the underlying states; every transition is recorded and fail-closed.</desc>

  <style>
    .fg-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Helvetica Neue", Arial, "Liberation Sans", sans-serif; }
    .fg-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }

    .fg-stroke        { fill: none; stroke: #2d3344; stroke-width: 1.25; stroke-linecap: round; stroke-linejoin: round; }
    .fg-stroke-soft   { fill: none; stroke: #2d3344; stroke-width: 0.75; stroke-linecap: round; stroke-linejoin: round; opacity: 0.4; }
    .fg-stroke-rail   { fill: none; stroke: #4f6b9c; stroke-width: 1.5;  stroke-linecap: round; stroke-linejoin: round; }
    .fg-stroke-violet { fill: none; stroke: #6f5ac9; stroke-width: 1.5;  stroke-linecap: round; stroke-linejoin: round; }
    .fg-stroke-rust   { fill: none; stroke: #b8553a; stroke-width: 1.5;  stroke-linecap: round; stroke-linejoin: round; }

    .fg-fill-mute   { fill: #1f2330; }
    .fg-fill-muted  { fill: #4a5066; }
    .fg-fill-rail   { fill: #4f6b9c; }
    .fg-fill-violet { fill: #6f5ac9; }
    .fg-fill-rust   { fill: #b8553a; }

    .fg-text-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.22em; fill: #4a5066; }
    .fg-text-phase   { font-size: 12px; font-weight: 700; letter-spacing: 0.18em; fill: #1f2330; }
    .fg-text-pill    { font-size: 11px; font-weight: 500; letter-spacing: 0.04em; fill: #1f2330; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .fg-text-pill-muted { font-size: 9.5px; font-weight: 500; letter-spacing: 0.08em; fill: #4a5066; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .fg-text-caption { font-size: 10.5px; font-weight: 500; letter-spacing: 0.04em; fill: #4a5066; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .fg-text-num     { font-size: 22px; font-weight: 700; letter-spacing: 0; fill: #4a5066; opacity: 0.55; }

    @media (prefers-color-scheme: dark) {
      .fg-stroke        { stroke: #c4cad8; }
      .fg-stroke-soft   { stroke: #c4cad8; opacity: 0.4; }
      .fg-stroke-rail   { stroke: #7aa2f7; }
      .fg-stroke-violet { stroke: #bb9af7; }
      .fg-stroke-rust   { stroke: #d97757; }
      .fg-fill-mute   { fill: #d8dce6; }
      .fg-fill-muted  { fill: #8b92a8; }
      .fg-fill-rail   { fill: #7aa2f7; }
      .fg-fill-violet { fill: #bb9af7; }
      .fg-fill-rust   { fill: #d97757; }
      .fg-text-phase   { fill: #d8dce6; }
      .fg-text-pill    { fill: #d8dce6; }
      .fg-text-eyebrow { fill: #8b92a8; }
      .fg-text-pill-muted { fill: #8b92a8; }
      .fg-text-caption { fill: #8b92a8; }
      .fg-text-num     { fill: #8b92a8; opacity: 0.7; }
    }
  </style>

  <!-- ============================== Top caption ============================== -->
  <text class="fg-sans fg-text-eyebrow" x="20" y="22">EXECUTION LIFECYCLE</text>
  <text class="fg-mono fg-text-caption" x="1080" y="22" text-anchor="end">minimum lineage chain before a side effect</text>

  <!-- ============================== Inter-card arrows ============================== -->
  <g class="fg-stroke-rail" opacity="0.6">
    <!-- Arrow 1: COMPILE → AUTHORIZE -->
    <line x1="248" y1="124" x2="290" y2="124" />
    <polyline points="284,120 290,124 284,128" />
    <!-- Arrow 2: AUTHORIZE → EXECUTE -->
    <line x1="528" y1="124" x2="570" y2="124" />
    <polyline points="564,120 570,124 564,128" />
    <!-- Arrow 3: EXECUTE → VERIFY & RECORD -->
    <line x1="808" y1="124" x2="850" y2="124" />
    <polyline points="844,120 850,124 844,128" />
  </g>

  <!-- ============================== CARD 1: COMPILE ============================== -->
  <g transform="translate(20, 40)">
    <rect class="fg-stroke" x="0" y="0" width="220" height="168" rx="6" />
    <!-- Header bar -->
    <line class="fg-stroke-soft" x1="0" y1="36" x2="220" y2="36" />
    <text class="fg-sans fg-text-num" x="14" y="26">1</text>
    <circle class="fg-fill-rail" cx="194" cy="18" r="3" />
    <text class="fg-sans fg-text-phase" x="34" y="24">COMPILE</text>
    <!-- Sub-state pills -->
    <g transform="translate(12, 52)">
      <rect class="fg-stroke-soft" x="0" y="0" width="196" height="24" rx="4" />
      <text class="fg-mono fg-text-pill" x="12" y="16">Intent</text>
    </g>
    <g transform="translate(12, 84)">
      <rect class="fg-stroke-soft" x="0" y="0" width="196" height="24" rx="4" />
      <text class="fg-mono fg-text-pill" x="12" y="16">Proposal</text>
    </g>
    <g transform="translate(12, 116)">
      <rect class="fg-stroke-soft" x="0" y="0" width="196" height="24" rx="4" />
      <text class="fg-mono fg-text-pill" x="12" y="16">PolicyEvaluated</text>
    </g>
  </g>

  <!-- ============================== CARD 2: AUTHORIZE ============================== -->
  <g transform="translate(300, 40)">
    <rect class="fg-stroke" x="0" y="0" width="220" height="168" rx="6" />
    <line class="fg-stroke-soft" x1="0" y1="36" x2="220" y2="36" />
    <text class="fg-sans fg-text-num" x="14" y="26">2</text>
    <circle class="fg-fill-violet" cx="194" cy="18" r="3" />
    <text class="fg-sans fg-text-phase" x="34" y="24">AUTHORIZE</text>
    <!-- Sub-state pills -->
    <g transform="translate(12, 52)">
      <rect class="fg-stroke-violet" x="0" y="0" width="196" height="24" rx="4" />
      <text class="fg-mono fg-text-pill" x="12" y="16">CapabilityMinted</text>
    </g>
    <g transform="translate(12, 84)">
      <rect class="fg-stroke-soft" x="0" y="0" width="196" height="24" rx="4" />
      <text class="fg-mono fg-text-pill" x="12" y="16">ActionProposalSubmitted</text>
    </g>
    <!-- TTL hint -->
    <g transform="translate(12, 124)">
      <line class="fg-stroke-soft" x1="0" y1="0" x2="196" y2="0" />
      <text class="fg-mono fg-text-pill-muted" x="0" y="16">TTL ≤ 300s · single-use</text>
    </g>
  </g>

  <!-- ============================== CARD 3: EXECUTE ============================== -->
  <g transform="translate(580, 40)">
    <rect class="fg-stroke" x="0" y="0" width="220" height="168" rx="6" />
    <line class="fg-stroke-soft" x1="0" y1="36" x2="220" y2="36" />
    <text class="fg-sans fg-text-num" x="14" y="26">3</text>
    <circle class="fg-fill-rail" cx="194" cy="18" r="3" />
    <text class="fg-sans fg-text-phase" x="34" y="24">EXECUTE</text>
    <!-- Sub-state pills -->
    <g transform="translate(12, 52)">
      <rect class="fg-stroke-soft" x="0" y="0" width="196" height="24" rx="4" />
      <text class="fg-mono fg-text-pill" x="12" y="16">SideEffectPrepared</text>
    </g>
    <g transform="translate(12, 84)">
      <rect class="fg-stroke-soft" x="0" y="0" width="196" height="24" rx="4" />
      <text class="fg-mono fg-text-pill" x="12" y="16">ToolCallPrepared</text>
    </g>
    <g transform="translate(12, 116)">
      <rect class="fg-stroke-soft" x="0" y="0" width="196" height="24" rx="4" />
      <text class="fg-mono fg-text-pill" x="12" y="16">ToolCallExecuted</text>
    </g>
  </g>

  <!-- ============================== CARD 4: VERIFY & RECORD ============================== -->
  <g transform="translate(860, 40)">
    <rect class="fg-stroke" x="0" y="0" width="220" height="168" rx="6" />
    <line class="fg-stroke-soft" x1="0" y1="36" x2="220" y2="36" />
    <text class="fg-sans fg-text-num" x="14" y="26">4</text>
    <circle class="fg-fill-rust" cx="194" cy="18" r="3" />
    <text class="fg-sans fg-text-phase" x="34" y="24">VERIFY &amp; RECORD</text>
    <!-- Sub-state pills -->
    <g transform="translate(12, 46)">
      <rect class="fg-stroke-soft" x="0" y="0" width="196" height="22" rx="4" />
      <text class="fg-mono fg-text-pill" x="12" y="15">SideEffectVerified</text>
    </g>
    <g transform="translate(12, 74)">
      <rect class="fg-stroke-rust" x="0" y="0" width="196" height="22" rx="4" />
      <text class="fg-mono fg-text-pill" x="12" y="15">Terminal</text>
    </g>
    <!-- Terminal outcomes: vertical stack of 3 (no horizontal compression) -->
    <g transform="translate(14, 108)">
      <circle class="fg-fill-rail"   cx="3"  cy="6" r="2.5" />
      <text class="fg-mono fg-text-pill-muted" x="12" y="9">Committed</text>
    </g>
    <g transform="translate(14, 126)">
      <circle class="fg-fill-violet" cx="3"  cy="6" r="2.5" />
      <text class="fg-mono fg-text-pill-muted" x="12" y="9">Compensated</text>
    </g>
    <g transform="translate(14, 144)">
      <circle class="fg-fill-rust"   cx="3"  cy="6" r="2.5" />
      <text class="fg-mono fg-text-pill-muted" x="12" y="9">RolledBack</text>
    </g>
  </g>

  <!-- ============================== Bottom caption ============================== -->
  <text class="fg-mono fg-text-caption" x="20" y="228">Every transition is recorded; unknown tools and missing lineage fail closed.</text>
  <text class="fg-mono fg-text-caption" x="1080" y="228" text-anchor="end">provenance chain · tamper-evident ledger</text>
</svg>
