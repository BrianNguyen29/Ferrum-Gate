openapi: 3.1.0
info:
  title: FerrumGate Control API
  version: 0.1.0
  description: |
    REST control plane API for FerrumGate v1.

    ## Authentication

    When auth mode is set to "bearer", all endpoints except `/v1/healthz`, `/v1/readyz`, `/v1/readyz/deep`, and `/v1/metrics`
    require a Bearer token in the Authorization header:

    ```
    Authorization: Bearer <token>
    ```

    ## TLS

    This API does not terminate TLS. Deploy behind a TLS-terminating proxy
    (e.g., nginx, cloud load balancer) for production use.

servers:
  - url: http://localhost:8080

paths:
  /v1/healthz:
    get:
      summary: Basic health check (unauthenticated)
      operationId: healthz
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /v1/readyz:
    get:
      summary: Shallow readiness check (unauthenticated)
      operationId: readyz
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /v1/readyz/deep:
    get:
      summary: Deep readiness check (unauthenticated)
      operationId: readyzDeep
      security: []
      responses:
        '200':
          description: Store is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeepHealthResponse'
        '503':
          description: Store health check failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeepHealthResponse'

  /v1/metrics:
    get:
      summary: Bounded Prometheus-style metrics (unauthenticated)
      operationId: metrics
      description: |
        Returns Prometheus text exposition format with the following metric families:

        - `ferrumgate_http_requests_total` - HTTP request counters by route
        - `ferrumgate_store_health_up` - Store health gauge (1=ok, 0=unhealthy)
        - `ferrumgate_metrics_scrapes_total` - Metrics endpoint scrape counter
        - `ferrumgate_governance_errors_total` - Governance error counters by route

        **Note**: This endpoint is intentionally bounded. It does not expose
        latency histograms, WAL/page gauges, or connection-pool saturation signals.
      operationId: metrics
      security: []
      responses:
        '200':
          description: Metrics in Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string

  /v1/intents/compile:
    post:
      summary: Compile an IntentEnvelope
      operationId: compileIntent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntentCompileRequest'
      responses:
        '201':
          description: Intent compiled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntentCompileResponse'
        '400':
          $ref: '#/components/responses/ApiError'
      security:
        - BearerAuth: []

  /v1/proposals/{proposal_id}/evaluate:
    post:
      summary: Evaluate proposal via policy
      operationId: evaluateProposal
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      responses:
        '200':
          description: Evaluation response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluateProposalResponse'
        '404':
          $ref: '#/components/responses/ApiError'
      security:
        - BearerAuth: []

  /v1/capabilities/mint:
    post:
      summary: Mint a capability lease
      operationId: mintCapability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapabilityMintRequest'
      responses:
        '201':
          description: Capability minted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityMintResponse'
        '400':
          $ref: '#/components/responses/ApiError'
        '403':
          $ref: '#/components/responses/ApiError'
      security:
        - BearerAuth: []

  /v1/capabilities/{capability_id}/revoke:
    post:
      summary: Revoke capability
      operationId: revokeCapability
      parameters:
        - $ref: '#/components/parameters/CapabilityId'
      responses:
        '200':
          description: Capability revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
      security:
        - BearerAuth: []

  /v1/executions/authorize:
    post:
      summary: Authorize execution from proposal + capability
      operationId: authorizeExecution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorizeExecutionRequest'
      responses:
        '200':
          description: Execution authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizeExecutionResponse'
        '403':
          $ref: '#/components/responses/ApiError'
        '422':
          $ref: '#/components/responses/ApiError'
      security:
        - BearerAuth: []

  /v1/executions/{execution_id}/prepare:
    post:
      summary: Prepare rollback / preflight checks
      operationId: prepareExecution
      parameters:
        - $ref: '#/components/parameters/ExecutionId'
      responses:
        '200':
          description: Prepare result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrepareExecutionResponse'
        '404':
          $ref: '#/components/responses/ApiError'
      security:
        - BearerAuth: []

  /v1/executions/{execution_id}:
    get:
      summary: Get execution record
      operationId: getExecution
      parameters:
        - $ref: '#/components/parameters/ExecutionId'
      responses:
        '200':
          description: Execution record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionRecord'
        '404':
          $ref: '#/components/responses/ApiError'
      security:
        - BearerAuth: []

  /v1/approvals:
    get:
      summary: List pending approvals
      operationId: listApprovals
      parameters:
        - name: proposal_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter to only pending approvals for this proposal (exact match)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Maximum number of approvals to return
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of approvals to skip
      responses:
        '200':
          description: List of pending approvals
          content:
            application/json:
              schema:
                type: object
                properties:
                  approvals:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApprovalRequest'
      security:
        - BearerAuth: []

  /v1/approvals/{approval_id}:
    get:
      summary: Get approval
      operationId: getApproval
      parameters:
        - $ref: '#/components/parameters/ApprovalId'
      responses:
        '200':
          description: Approval object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
        '404':
          $ref: '#/components/responses/ApiError'
      security:
        - BearerAuth: []

  /v1/provenance/query:
    post:
      summary: Query provenance events
      operationId: queryProvenance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProvenanceQueryRequest'
      responses:
        '200':
          description: Provenance query result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvenanceQueryResponse'
      security:
        - BearerAuth: []

  /v1/provenance/lineage/{execution_id}:
    get:
      summary: Get lineage for execution
      operationId: getExecutionLineage
      parameters:
        - $ref: '#/components/parameters/ExecutionId'
      responses:
        '200':
          description: Lineage data
          content:
            application/json:
              schema:
                type: object
                properties:
                  execution_id:
                    type: string
                    format: uuid
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProvenanceEvent'
      security:
        - BearerAuth: []

  /v1/provenance/lineage:
    post:
      summary: Multi-hop lineage query from seed event
      description: |
        Traverses provenance ancestry and/or descendant edges from a seed event_id
        up to a configurable maximum depth (hops). Use this for debugging lineage chains
        and understanding event dependencies.
      operationId: queryLineage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LineageQueryRequest'
      responses:
        '200':
          description: Multi-hop lineage result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LineageQueryResponse'
        '404':
          $ref: '#/components/responses/ApiError'
      security:
        - BearerAuth: []

  /v1/provenance/ingest:
    post:
      summary: Ingest external provenance event
      description: |
        Ingests a provenance event from an external source runtime into FerrumGate's
        lineage ledger. The source_runtime_id must reference a registered bridge.
        Fails closed if the source is not a known registered bridge.
      operationId: ingestProvenance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProvenanceIngestRequest'
      responses:
        '200':
          description: Event ingested and linked to ledger
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvenanceIngestResponse'
        '400':
          $ref: '#/components/responses/ApiError'
      security:
        - BearerAuth: []

  /v1/bridges:
    get:
      summary: List registered runtime bridges
      operationId: listBridges
      responses:
        '200':
          description: List of bridges and their connection status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgeListResponse'
      security:
        - BearerAuth: []

  /v1/bridges/{bridge_id}/tools:
    get:
      summary: List tools available through a bridge
      operationId: listBridgeTools
      parameters:
        - $ref: '#/components/parameters/BridgeId'
      responses:
        '200':
          description: List of tools exposed by the bridge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgeToolsResponse'
        '404':
          $ref: '#/components/responses/ApiError'
        '503':
          $ref: '#/components/responses/ApiError'
      security:
        - BearerAuth: []

  /v1/executions/{execution_id}/compensate:
    post:
      summary: Compensate (rollback) an execution via its rollback contract
      operationId: compensateExecution
      parameters:
        - $ref: '#/components/parameters/ExecutionId'
      responses:
        '200':
          description: Compensation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompensateExecutionResponse'
        '404':
          $ref: '#/components/responses/ApiError'
      security:
        - BearerAuth: []

  /v1/executions/{execution_id}/evaluate-outcome:
    post:
      summary: Evaluate an execution outcome against intent policy
      operationId: evaluateOutcome
      parameters:
        - $ref: '#/components/parameters/ExecutionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutcomeReport'
      responses:
        '200':
          description: Outcome evaluation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluateOutcomeResponse'
        '400':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'
      security:
        - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  parameters:
    IntentId:
      name: intent_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProposalId:
      name: proposal_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CapabilityId:
      name: capability_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExecutionId:
      name: execution_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApprovalId:
      name: approval_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EventId:
      name: event_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BridgeId:
      name: bridge_id
      in: path
      required: true
      schema:
        type: string
        description: Runtime bridge identifier

  responses:
    ApiError:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  schemas:
    ApiError:
      type: object
      required: [code, message, correlation_id, retriable, details]
      properties:
        code:
          type: string
          enum:
            - ValidationError
            - NotFound
            - PolicyDenied
            - ApprovalRequired
            - CapabilityExpired
            - CapabilityRevoked
            - IntegrityMismatch
            - RollbackUnsupported
            - AdapterFailure
            - Conflict
            - Internal
            - Unauthorized
        message:
          type: string
        correlation_id:
          type: string
        retriable:
          type: boolean
        details:
          type: object

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ComponentStatus:
      type: object
      required: [component, status, healthy]
      properties:
        component:
          type: string
        status:
          type: string
        healthy:
          type: boolean
        error:
          type: string

    DeepHealthResponse:
      type: object
      required: [status, healthy, components]
      properties:
        status:
          type: string
        healthy:
          type: boolean
        components:
          type: array
          items:
            $ref: '#/components/schemas/ComponentStatus'

    IntentCompileRequest:
      type: object
      required: [principal_id, title, goal, raw_inputs, requested_resource_scope, metadata]
      properties:
        principal_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
          nullable: true
        channel_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        goal:
          type: string
        agent_plan_summary:
          type: string
          nullable: true
        trusted_context:
          type: object
        raw_inputs:
          type: array
          items:
            $ref: '#/components/schemas/IntentInputRef'
        requested_resource_scope:
          type: array
          items:
            type: object
        requested_risk_tier:
          type: string
          nullable: true
        metadata:
          type: object

    IntentInputRef:
      type: object
      required: [source_id, source_type, trust_labels, sensitivity_labels, summary]
      properties:
        source_id:
          type: string
        source_type:
          type: string
        trust_labels:
          type: array
          items:
            type: string
        sensitivity_labels:
          type: array
          items:
            type: string
        summary:
          type: string
        event_id:
          type: string
          format: uuid
          nullable: true

    IntentCompileResponse:
      type: object
      required: [envelope, warnings]
      properties:
        envelope:
          $ref: '#/components/schemas/IntentEnvelope'
        warnings:
          type: array
          items:
            type: string

    IntentEnvelope:
      type: object
      required:
        - intent_id
        - principal_id
        - title
        - goal
        - normalized_goal
        - allowed_outcomes
        - forbidden_outcomes
        - resource_scope
        - risk_tier
        - approval_mode
        - default_rollback_class
        - time_budget
        - trust_context
        - status
        - created_at
        - expires_at
      properties:
        intent_id:
          type: string
          format: uuid
        principal_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
          nullable: true
        channel_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        goal:
          type: string
        normalized_goal:
          type: string
        allowed_outcomes:
          type: array
          items:
            type: object
        forbidden_outcomes:
          type: array
          items:
            type: object
        resource_scope:
          type: array
          items:
            type: object
        risk_tier:
          type: string
        approval_mode:
          type: string
        default_rollback_class:
          type: string
        time_budget:
          type: object
        trust_context:
          type: object
        derived_from_event_ids:
          type: array
          items:
            type: string
            format: uuid
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
        status:
          type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    ActionProposal:
      type: object
      required:
        - proposal_id
        - intent_id
        - step_index
        - title
        - tool_name
        - server_name
        - raw_arguments
        - expected_effect
        - estimated_risk
        - requested_rollback_class
        - taint_inputs
        - created_at
      properties:
        proposal_id:
          type: string
          format: uuid
        intent_id:
          type: string
          format: uuid
        step_index:
          type: integer
        title:
          type: string
        tool_name:
          type: string
        server_name:
          type: string
        raw_arguments: {}
        expected_effect:
          type: string
        estimated_risk:
          type: string
        requested_rollback_class:
          type: string
        taint_inputs:
          type: array
          items:
            type: string
        metadata:
          type: object
        created_at:
          type: string
          format: date-time

    EvaluateProposalResponse:
      type: object
      required: [decision, reason, matched_rule_ids, warnings]
      properties:
        decision:
          type: string
        reason:
          type: string
        matched_rule_ids:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string

    CapabilityMintRequest:
      type: object
      required: [intent_id, proposal_id, tool_binding, resource_bindings, argument_constraints, taint_budget, requested_ttl_secs, metadata]
      properties:
        intent_id:
          type: string
          format: uuid
        proposal_id:
          type: string
          format: uuid
        tool_binding:
          type: object
        resource_bindings:
          type: array
          items:
            type: object
        argument_constraints:
          type: array
          items:
            type: object
        taint_budget:
          type: object
        approval_binding:
          type: object
          nullable: true
        requested_ttl_secs:
          type: integer
        metadata:
          type: object

    CapabilityMintResponse:
      type: object
      required: [lease, warnings]
      properties:
        lease:
          $ref: '#/components/schemas/CapabilityLease'
        warnings:
          type: array
          items:
            type: string

    CapabilityLease:
      type: object
      required:
        - capability_id
        - intent_id
        - proposal_id
        - tool_binding
        - resource_bindings
        - argument_constraints
        - taint_budget
        - issued_by
        - policy_bundle_id
        - status
        - issued_at
        - expires_at
      properties:
        capability_id:
          type: string
          format: uuid
        intent_id:
          type: string
          format: uuid
        proposal_id:
          type: string
          format: uuid
        tool_binding:
          type: object
        resource_bindings:
          type: array
          items:
            type: object
        argument_constraints:
          type: array
          items:
            type: object
        taint_budget:
          type: object
        approval_binding:
          type: object
          nullable: true
        issued_by:
          type: string
        policy_bundle_id:
          type: string
          format: uuid
        tool_manifest_id:
          type: string
          format: uuid
          nullable: true
        manifest_hash:
          type: string
          nullable: true
        status:
          type: string
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object

    AuthorizeExecutionRequest:
      type: object
      required: [proposal_id, capability_id, dry_run]
      properties:
        proposal_id:
          type: string
          format: uuid
        capability_id:
          type: string
          format: uuid
        dry_run:
          type: boolean

    AuthorizeExecutionResponse:
      type: object
      required: [execution, warnings]
      properties:
        execution:
          $ref: '#/components/schemas/ExecutionRecord'
        warnings:
          type: array
          items:
            type: string

    ExecutionRecord:
      type: object
      required: [execution_id, proposal_id, intent_id, capability_id, decision, state, started_at]
      properties:
        execution_id:
          type: string
          format: uuid
        proposal_id:
          type: string
          format: uuid
        intent_id:
          type: string
          format: uuid
        capability_id:
          type: string
          format: uuid
        rollback_contract_id:
          type: string
          format: uuid
          nullable: true
        decision:
          type: string
        state:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true
        result_digest:
          type: string
          nullable: true
        metadata:
          type: object

    PrepareExecutionResponse:
      type: object
      required: [execution_id, prepared, warnings]
      properties:
        execution_id:
          type: string
          format: uuid
        prepared:
          type: boolean
        rollback_contract:
          $ref: '#/components/schemas/RollbackContract'
        warnings:
          type: array
          items:
            type: string

    RollbackContract:
      type: object
      required:
        - contract_id
        - intent_id
        - proposal_id
        - execution_id
        - action_type
        - rollback_class
        - adapter_key
        - target
        - prepare_checks
        - verify_checks
        - compensation_plan
        - auto_commit
        - state
        - created_at
      properties:
        contract_id:
          type: string
          format: uuid
        intent_id:
          type: string
          format: uuid
        proposal_id:
          type: string
          format: uuid
        execution_id:
          type: string
          format: uuid
        action_type:
          type: string
        rollback_class:
          type: string
        adapter_key:
          type: string
        target:
          type: object
        prepare_checks:
          type: array
          items:
            type: object
        verify_checks:
          type: array
          items:
            type: object
        compensation_plan:
          type: array
          items:
            type: object
        auto_commit:
          type: boolean
        state:
          type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object

    ApprovalRequest:
      type: object
      required: [approval_id, intent_id, proposal_id, requested_by, reason, action_digest, expires_at, state, created_at]
      properties:
        approval_id:
          type: string
          format: uuid
        intent_id:
          type: string
          format: uuid
        proposal_id:
          type: string
          format: uuid
        execution_id:
          type: string
          format: uuid
          nullable: true
        requested_by:
          type: object
        reason:
          type: string
        action_digest:
          type: string
        expires_at:
          type: string
          format: date-time
        state:
          type: string
        created_at:
          type: string
          format: date-time

    ApprovalResolveRequest:
      type: object
      required: [actor, approve]
      properties:
        actor:
          type: object
        approve:
          type: boolean
        reason:
          type: string
          nullable: true

    ProvenanceQueryRequest:
      type: object
      properties:
        intent_id:
          type: string
          format: uuid
          nullable: true
        execution_id:
          type: string
          format: uuid
          nullable: true
        capability_id:
          type: string
          format: uuid
          nullable: true
        event_kind:
          type: string
          nullable: true
        since:
          type: string
          format: date-time
          nullable: true
        until:
          type: string
          format: date-time
          nullable: true
        edge_types:
          type: array
          items:
            type: string
            enum:
              - DerivedFrom
              - AuthorizedBy
              - ApprovedBy
              - TaintedBy
              - UsesManifest
              - EvaluatedByPolicy
              - Caused
              - Compensates
              - Verifies
              - References
          default: []
          description: Filter events by edge types. Only events that have at least one parent edge matching one of the specified types will be returned. Empty or omitted means no edge-type filtering.

    ProvenanceQueryResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/ProvenanceEvent'

    ProvenanceEvent:
      type: object
      required: [event_id, kind, occurred_at, actor, object, trust_labels, sensitivity_labels, parent_edges, hash_chain]
      properties:
        event_id:
          type: string
          format: uuid
        kind:
          type: string
        occurred_at:
          type: string
          format: date-time
        actor:
          type: object
        object:
          type: object
        intent_id:
          type: string
          format: uuid
          nullable: true
        proposal_id:
          type: string
          format: uuid
          nullable: true
        execution_id:
          type: string
          format: uuid
          nullable: true
        capability_id:
          type: string
          format: uuid
          nullable: true
        rollback_contract_id:
          type: string
          format: uuid
          nullable: true
        policy_bundle_id:
          type: string
          format: uuid
          nullable: true
        trust_labels:
          type: array
          items:
            type: string
        sensitivity_labels:
          type: array
          items:
            type: string
        parent_edges:
          type: array
          items:
            $ref: '#/components/schemas/ProvenanceEdge'
        hash_chain:
          type: object
        metadata:
          type: object
        source_runtime_id:
          type: string
          nullable: true
          description: Identifier of the source runtime that produced this event. None for internally-generated events.

    ProvenanceEdge:
      type: object
      required: [edge_type, from_event_id]
      properties:
        edge_type:
          type: string
          enum:
            - DerivedFrom
            - AuthorizedBy
            - ApprovedBy
            - TaintedBy
            - UsesManifest
            - EvaluatedByPolicy
            - Caused
            - Compensates
            - Verifies
            - References
        from_event_id:
          type: string
          format: uuid
          description: The parent event (source of the edge)
        to_event_id:
          type: string
          format: uuid
          nullable: true
          description: The child event (target of the edge), used for descendant traversal
        summary:
          type: string
          nullable: true

    LineageQueryRequest:
      type: object
      required: [event_id]
      properties:
        event_id:
          type: string
          format: uuid
          description: The seed event_id to start traversal from
        direction:
          type: string
          enum: [ancestors, descendants, both]
          default: ancestors
          description: Direction to traverse - ancestors (parents only), descendants (children only), or both
        max_hops:
          type: integer
          minimum: 1
          maximum: 10
          default: 3
          description: Maximum number of hops to traverse (1-10)

    LineageQueryResponse:
      type: object
      required: [events, edges]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/ProvenanceEvent'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/ProvenanceEdge'

    ProvenanceIngestRequest:
      type: object
      required: [source_runtime_id, kind, description, trust_labels, sensitivity_labels, metadata]
      properties:
        source_runtime_id:
          type: string
          description: Identifier of the source runtime that produced this event
        kind:
          type: string
          enum:
            - UserGoalReceived
            - IntentCompiled
            - IntentRevoked
            - ActionProposalSubmitted
            - PolicyEvaluated
            - CapabilityMinted
            - CapabilityRevoked
            - ApprovalRequested
            - ApprovalGranted
            - ApprovalDenied
            - ToolCallPrepared
            - ToolCallIntercepted
            - ToolCallExecuted
            - ToolOutputReceived
            - ToolOutputSanitized
            - DlpBlocked
            - SideEffectPrepared
            - SideEffectVerified
            - SideEffectCommitted
            - SideEffectCompensated
            - SideEffectRolledBack
            - Quarantined
            - ErrorRaised
            - ExternalEventReceived
        description:
          type: string
        execution_id:
          type: string
          format: uuid
          nullable: true
        intent_id:
          type: string
          format: uuid
          nullable: true
        trust_labels:
          type: array
          items:
            type: string
            enum:
              - Trusted
              - UserProvided
              - InternalPolicy
              - InternalSystem
              - ExternalWeb
              - ExternalEmail
              - ExternalRepoText
              - ExternalToolMetadata
              - ExternalToolOutput
              - OCRExtracted
              - Untrusted
        sensitivity_labels:
          type: array
          items:
            type: string
            enum:
              - Public
              - Internal
              - Confidential
              - Secret
              - Credential
              - Pii
        metadata:
          type: object

    ProvenanceIngestResponse:
      type: object
      required: [event_id, linked]
      properties:
        event_id:
          type: string
          format: uuid
        linked:
          type: boolean

    BridgeInfo:
