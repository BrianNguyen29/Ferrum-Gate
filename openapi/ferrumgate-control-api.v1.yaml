          type: string
          format: uuid
        proposal_id:
          type: string
          format: uuid
        execution_id:
          type: string
          format: uuid
        action_type:
          type: string
        rollback_class:
          type: string
        adapter_key:
          type: string
        target:
          type: object
        prepare_checks:
          type: array
          items:
            type: object
        verify_checks:
          type: array
          items:
            type: object
        compensation_plan:
          type: array
