    BridgeToolsResponse:
      type: object
      required: [runtime_id, tools]
      properties:
        runtime_id:
          type: string
        tools:
          type: array
          items:
            $ref: '#/components/schemas/BridgeToolInfo'

    CompensateExecutionResponse:
      type: object
