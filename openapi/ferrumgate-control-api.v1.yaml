    ApprovalResolveRequest:
      type: object
      required: [actor, approve]
      properties:
        actor:
          type: object
        approve:
          type: boolean
        reason:
          type: string
          nullable: true

    ProvenanceQueryRequest:
      type: object
      properties:
        intent_id:
          type: string
          format: uuid
          nullable: true
        proposal_id:
          type: string
          format: uuid
          nullable: true
        execution_id:
          type: string
          format: uuid
          nullable: true
        capability_id:
          type: string
          format: uuid
          nullable: true
        event_kind:
          type: string
          nullable: true
        terminal_only:
          type: boolean
          nullable: true
        since:
          type: string
          format: date-time
          nullable: true
        until:
          type: string
          format: date-time
          nullable: true
        limit:
          type: integer
          nullable: true
          description: Maximum number of events to return (1-10000). Defaults to 100.
        cursor:
          type: string
          nullable: true
          description: Cursor for keyset pagination. Use the returned next_cursor to advance. The cursor encodes the (occurred_at, event_id) of the last item in the previous page.

    ProvenanceQueryResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/ProvenanceEvent'
        next_cursor:
          type: string
          nullable: true
          description: Cursor for the next page. None if this is the last page.

    ProvenanceEventResponse:
      type: object
      required: [event]
      properties:
        event:
          $ref: '#/components/schemas/ProvenanceEvent'
        ancestry:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ProvenanceEvent'
        descendants:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ProvenanceEvent'

    ProvenanceEvent:
      type: object
      required: [event_id, kind, occurred_at, actor, object, trust_labels, sensitivity_labels, parent_edges, hash_chain]
      properties:
        event_id:
          type: string
          format: uuid
        kind:
          type: string
        occurred_at:
          type: string
          format: date-time
        actor:
          type: object
        object:
          type: object
        intent_id:
          type: string
          format: uuid
          nullable: true
        proposal_id:
          type: string
          format: uuid
          nullable: true
        execution_id:
          type: string
          format: uuid
          nullable: true
        capability_id:
          type: string
          format: uuid
          nullable: true
        rollback_contract_id:
          type: string
          format: uuid
          nullable: true
        policy_bundle_id:
          type: string
          format: uuid
          nullable: true
        trust_labels:
          type: array
          items:
            type: string
        sensitivity_labels:
          type: array
          items:
            type: string
        parent_edges:
          type: array
          items:
            type: object
        hash_chain:
          type: object
        metadata:
          type: object

    ExternalEventIngestRequest:
      type: object
      additionalProperties: false
      required: [execution_id, parent_event_id, source_system, source_event_id]
      properties:
        execution_id:
          type: string
          format: uuid
          description: The execution_id that this external event is being anchored to.
        parent_event_id:
          type: string
          format: uuid
          description: The parent event within the same execution that this external event observes.
        source_system:
          type: string
          description: Identifier for the external system or runtime that observed this event.
        source_event_id:
          type: string
          description: The event identifier assigned by the external source system.
        observed_at:
          type: string
          format: date-time
          nullable: true
          description: Optional wall-clock time when the external system observed the event.
        summary:
          type: string
          nullable: true
          description: Optional human-readable summary describing what was observed.
        payload_digest:
          type: string
          nullable: true
          description: Optional digest of the external event payload for integrity verification.
        metadata:
          type: object
          nullable: true
          description: Optional lightweight metadata bag. Small/simple values only. Stored under `external_metadata` so caller keys cannot override server-owned correlation fields.

    ExternalEventIngestResponse:
      type: object
      required: [event]
      properties:
        event:
          $ref: '#/components/schemas/ProvenanceEvent'

    LineageQueryRequest:
      type: object
      additionalProperties: false
      required: [execution_id, event_id]
      properties:
        execution_id:
          type: string
          format: uuid
          description: The execution_id to fence traversed events against.
        event_id:
          type: string
          format: uuid
          description: The seed event_id to start traversal from.
        ancestry:
          type: boolean
          default: true
          description: When true, walk ancestry backwards via parent edges.
        descendants:
          type: boolean
          default: false
          description: When true, walk descendants forwards via child edges.
        max_hops:
          type: integer
          minimum: 1
          maximum: 32
          nullable: true
          description: Maximum hops for BFS traversal. Hard-capped at 32 by the server. Defaults to 8.

    LineageQueryResponse:
      type: object
      required: [events, edges]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/ProvenanceEvent'
          description: All events discovered during traversal, including the seed event.
        edges:
          type: array
          items:
            $ref: '#/components/schemas/LineageEdge'
          description: Edges discovered during traversal.

    LineageEdge:
      type: object
      required: [edge_type, from_event_id, to_event_id]
      properties:
        edge_type:
          type: string
          description: The type of the provenance edge.
        from_event_id:
          type: string
          format: uuid
          description: The source event of the edge.
        to_event_id:
          type: string
          format: uuid
          description: The target event of the edge.
        summary:
          type: string
          nullable: true
          description: Optional human-readable summary of the edge.

    ProvenanceExportRequest:
      type: object
      properties:
        intent_id:
          type: string
          format: uuid
          nullable: true
          description: Filter by intent_id.
        proposal_id:
          type: string
          format: uuid
          nullable: true
          description: Filter by proposal_id.
        execution_id:
          type: string
          format: uuid
          nullable: true
          description: Filter by execution_id.
        capability_id:
          type: string
          format: uuid
          nullable: true
          description: Filter by capability_id.
        event_kind:
          type: string
          nullable: true
          description: Filter by event kind.
        terminal_only:
          type: boolean
          nullable: true
          description: Filter to terminal events only.
        since:
          type: string
          format: date-time
          nullable: true
          description: Filter events that occurred at or after this timestamp.
        until:
          type: string
          format: date-time
          nullable: true
          description: Filter events that occurred at or before this timestamp.
        limit:
          type: integer
          nullable: true
          description: Maximum number of events to export (1-10000). Defaults to 1000.
        cursor:
          type: string
          nullable: true
          description: Cursor for keyset pagination. Use the returned next_cursor to advance.

    ProvenanceExportResponse:
      type: object
      required: [events, total_matched, exported_count, export_info]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/ProvenanceEvent'
          description: Exported provenance events, sorted by occurred_at ascending, then event_id ascending.
        total_matched:
          type: integer
          format: uint64
          description: Number of events matched by the filter.
        exported_count:
          type: integer
          format: uint64
          description: Number of events included in this export page.
        next_cursor:
          type: string
          nullable: true
          description: Cursor for fetching the next page of exports. None if this is the last page.
        export_info:
          $ref: '#/components/schemas/ProvenanceExportInfo'

    ProvenanceExportInfo:
      type: object
      required: [exported_at, filters]
      properties:
        exported_at:
          type: string
          format: date-time
          description: RFC3339 timestamp when this export was generated.
        filters:
          $ref: '#/components/schemas/ProvenanceExportFilters'

    ProvenanceExportFilters:
      type: object
      properties:
        intent_id:
          type: boolean
          nullable: true
        proposal_id:
          type: boolean
          nullable: true
        execution_id:
          type: boolean
          nullable: true
        capability_id:
          type: boolean
          nullable: true
        event_kind:
          type: boolean
          nullable: true
        terminal_only:
          type: boolean
          nullable: true
        since:
          type: boolean
          nullable: true
        until:
          type: boolean
          nullable: true

    LedgerVerificationResponse:
      type: object
      required: [valid, entry_count, verified_at]
      properties:
        valid:
          type: boolean
          description: True if the ledger chain is valid, false if tampered or broken.
        entry_count:
          type: integer
          format: uint64
          description: Number of ledger entries verified.
        verified_at:
          type: string
          format: date-time
          description: Timestamp when verification was performed.
        error:
          description: Error details when verification fails (None when valid).
          nullable: true
          allOf:
            - $ref: '#/components/schemas/LedgerVerificationError'

    LedgerVerificationError:
      type: object
      required: [type, detail]
      properties:
        type:
          type: string
          enum:
            - BrokenChain
            - TamperDetected
            - SequenceMismatch
            - EmptyLedger
        detail:
          type: object
          description: Error detail object whose schema varies by type.

