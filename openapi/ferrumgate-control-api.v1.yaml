        connected:
          type: boolean

    BridgeListResponse:
      type: object
      required: [bridges]
      properties:
        bridges:
          type: array
          items:
            $ref: '#/components/schemas/BridgeInfo'

    BridgeToolInfo:
      type: object
      required: [name, description]
      properties:
        name:
