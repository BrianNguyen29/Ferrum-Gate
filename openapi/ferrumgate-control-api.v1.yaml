      type: object
      required: [bundles, total]
      properties:
        bundles:
          type: array
          items:
            $ref: '#/components/schemas/PolicyBundle'
        total:
          type: integer

    PolicyBundle:
      type: object
      required: [bundle_id, version, rules, active, created_at, updated_at]
      properties:
        bundle_id:
          type: string
          description: Unique identifier for this policy bundle.
        version:
          type: string
          description: Semantic version of the bundle format.
        rules:
          type: array
          items:
            $ref: '#/components/schemas/PolicyRule'
        active:
          type: boolean
          description: Whether this bundle is active for evaluation.
        content_hash:
          type: string
          nullable: true
          description: SHA-256 hash of the canonical JSON representation of this bundle.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PolicyRule:
      type: object
      required: [id, description, decision, priority, matchers]
      properties:
        id:
          type: string
          description: Unique rule identifier within the bundle.
        description:
          type: string
          description: Human-readable description of what this rule enforces.
        decision:
          type: string
          enum:
            - Allow
            - Deny
            - Quarantine
            - RequireApproval
            - AllowDraftOnly
        priority:
          type: integer
          description: Priority for rule evaluation (higher = evaluated first).
        matchers:
          type: array
          items:
            $ref: '#/components/schemas/Matcher'

    Matcher:
      oneOf:
        - type: object
          required: [type]
          properties:
            type:
              type: string
              enum: [scope_mismatch]
        - type: object
          required: [type, value]
          properties:
            type:
              type: string
              enum: [taint_at_least]
            value:
              type: integer
              minimum: 0
              maximum: 255
        - type: object
          required: [type]
          properties:
            type:
              type: string
              enum: [action_is_mutation]
        - type: object
          required: [type, value]
          properties:
            type:
              type: string
              enum: [rollback_class_equals]
            value:
              type: string
        - type: object
          required: [type, value]
          properties:
            type:
              type: string
              enum: [action_type_equals]
            value:
              type: string
        - type: object
          required: [type]
          properties:
            type:
              type: string
              enum: [unknown]
            extra:
              type: object
