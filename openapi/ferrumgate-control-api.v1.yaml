components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  parameters:
    IntentId:
      name: intent_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProposalId:
      name: proposal_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CapabilityId:
      name: capability_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExecutionId:
      name: execution_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApprovalId:
      name: approval_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EventId:
      name: event_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BridgeId:
      name: bridge_id
      in: path
      required: true
      schema:
        type: string
        description: Runtime bridge identifier
    BundleId:
      name: bundle_id
      in: path
      required: true
      schema:
        type: string
      description: Policy bundle identifier
    TokenId:
      name: token_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AgentId:
      name: agent_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OutboxId:
      name: outbox_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WindowStart:
      name: window_start
      in: path
      required: true
      schema:
        type: string

  responses:
    ApiError:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  schemas:
    ApiError:
      type: object
      required: [code, message, correlation_id, retriable, details]
      properties:
        code:
          type: string
          enum:
            - ValidationError
            - NotFound
            - PolicyDenied
            - ApprovalRequired
            - CapabilityExpired
            - CapabilityRevoked
            - IntegrityMismatch
            - RollbackUnsupported
            - AdapterFailure
            - Conflict
            - Internal
            - Unauthorized
            - MfaRequired
            - MfaInvalid
            - Misconfigured
        message:
          type: string
        correlation_id:
          type: string
        retriable:
          type: boolean
        details:
          type: object

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ComponentStatus:
      type: object
      required: [component, status, healthy]
      properties:
        component:
          type: string
        status:
          type: string
        healthy:
          type: boolean
        error:
          type: string

    DeepHealthResponse:
      type: object
      required: [status, healthy, components]
      properties:
        status:
          type: string
        healthy:
          type: boolean
        components:
          type: array
          items:
            $ref: '#/components/schemas/ComponentStatus'

    IntentCompileRequest:
      type: object
      required: [principal_id, title, goal, raw_inputs, requested_resource_scope, metadata]
      properties:
        principal_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
          nullable: true
        channel_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        goal:
          type: string
        agent_plan_summary:
          type: string
          nullable: true
        trusted_context:
          $ref: '#/components/schemas/TrustContext'
        raw_inputs:
          type: array
          items:
            $ref: '#/components/schemas/IntentInputRef'
        requested_resource_scope:
          type: array
          items:
            $ref: '#/components/schemas/ResourceScopeItem'
        requested_risk_tier:
          type: string
          enum:
            - Low
            - Medium
            - High
            - Critical
          nullable: true
        metadata:
          type: object

    IntentInputRef:
      type: object
      required: [source_id, source_type, trust_labels, sensitivity_labels, summary]
      properties:
        source_id:
          type: string
        source_type:
          type: string
        trust_labels:
          type: array
          items:
            type: string
        sensitivity_labels:
          type: array
          items:
            type: string
        summary:
          type: string
        event_id:
          type: string
          format: uuid
          nullable: true

    IntentListItem:
      type: object
      required: [intent_id, principal_id, title, status, risk_tier, created_at]
      properties:
        intent_id:
          type: string
          format: uuid
        principal_id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum:
            - Active
            - Closed
            - Expired
            - Quarantined
            - Revoked
          description: Intent status (Active, Closed, Expired, Quarantined, Revoked)
        risk_tier:
          type: string
          enum:
            - Low
            - Medium
            - High
            - Critical
          description: Risk tier (Low, Medium, High, Critical)
        exec_state:
          type: string
          enum:
            - Proposed
            - Authorized
            - Prepared
            - Running
            - AwaitingApproval
            - AwaitingVerification
            - Committed
            - Compensated
            - RolledBack
            - Denied
            - Quarantined
            - Failed
            - Canceled
          nullable: true
          description: Latest execution state for this intent when an execution exists; null when no execution exists.
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true

    IntentCompileResponse:
      type: object
      required: [envelope, warnings]
      properties:
        envelope:
          $ref: '#/components/schemas/IntentEnvelope'
        warnings:
          type: array
          items:
            type: string

    IntentEnvelope:
      type: object
      required:
        - intent_id
        - principal_id
        - title
        - goal
        - normalized_goal
        - allowed_outcomes
        - forbidden_outcomes
        - resource_scope
        - risk_tier
        - approval_mode
        - default_rollback_class
        - time_budget
        - trust_context
        - status
        - created_at
        - expires_at
      properties:
        intent_id:
          type: string
          format: uuid
        principal_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
          nullable: true
        channel_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        goal:
          type: string
        normalized_goal:
          type: string
        allowed_outcomes:
          type: array
          items:
            $ref: '#/components/schemas/OutcomeConstraint'
        forbidden_outcomes:
          type: array
          items:
            $ref: '#/components/schemas/OutcomeConstraint'
        resource_scope:
          type: array
          items:
            $ref: '#/components/schemas/ResourceScopeItem'
        risk_tier:
          type: string
          enum:
            - Low
            - Medium
            - High
            - Critical
        approval_mode:
          type: string
          enum:
            - None
            - Required
            - DraftOnly
            - TwoPhaseCommit
        default_rollback_class:
          type: string
          enum:
            - R0NativeReversible
            - R1SnapshotRecoverable
            - R2Compensatable
            - R3IrreversibleHighConsequence
        time_budget:
          $ref: '#/components/schemas/TimeBudget'
        trust_context:
          $ref: '#/components/schemas/TrustContext'
        derived_from_event_ids:
          type: array
          items:
            type: string
            format: uuid
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
        status:
          type: string
          enum:
            - Active
            - Closed
            - Expired
            - Quarantined
            - Revoked
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    ActionProposal:
      type: object
      required:
        - proposal_id
        - intent_id
        - step_index
        - title
        - tool_name
        - server_name
        - raw_arguments
        - expected_effect
        - estimated_risk
        - requested_rollback_class
        - taint_inputs
        - created_at
      properties:
        proposal_id:
          type: string
          format: uuid
        intent_id:
          type: string
          format: uuid
        step_index:
          type: integer
        title:
          type: string
        tool_name:
          type: string
        server_name:
          type: string
        raw_arguments: {}
        expected_effect:
          type: string
        estimated_risk:
          type: string
          enum:
            - Low
            - Medium
            - High
            - Critical
        requested_rollback_class:
          type: string
