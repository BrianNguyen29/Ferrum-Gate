apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "ferrumgate.fullname" . }}-test-connection"
  labels:
    {{- include "ferrumgate.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['-O-', '{{ include "ferrumgate.fullname" . }}:{{ .Values.service.port }}/v1/healthz']
  restartPolicy: Never
