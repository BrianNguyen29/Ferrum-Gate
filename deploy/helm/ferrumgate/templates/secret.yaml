{{- $authMode := lower (toString .Values.config.authMode) }}
{{- $existingSecret := default "" .Values.secrets.existingSecret }}
{{- $existingSecretKey := default "bearer-token" .Values.secrets.existingSecretKey }}
{{- $bearerToken := toString .Values.secrets.bearerToken }}
{{- if and (eq $authMode "bearer") (eq $existingSecret "") (or (eq $bearerToken "") (eq $bearerToken "CHANGE_ME_TO_A_SECURE_TOKEN")) }}
{{- fail "config.authMode=bearer requires secrets.bearerToken to be set to a real token or secrets.existingSecret to reference an existing Kubernetes Secret" }}
{{- end }}
{{- if eq $existingSecret "" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ferrumgate.fullname" . }}
  labels:
    {{- include "ferrumgate.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ $existingSecretKey }}: {{ .Values.secrets.bearerToken | quote }}
{{- end }}
